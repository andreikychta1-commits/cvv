<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lets goo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-hearts">
    <span>💗</span><span>💖</span><span>💕</span><span>💘</span>
  </div>

  <header>
    <h1 id="mainTitle">У тебя всё получится 💝</h1>
    <p> я буду рядом с тобой 💞</p>
  </header>

  <main>
    <div class="envelope" id="envelope">
      <div class="back"></div>
      <div class="letter" id="letter">
        <h2>Will you become my wife? </h2>

        <div class="line">💞</div>

        <div class="choices" id="choices">
          <button class="yes" id="btnYes">Да! ❤️</button>
          <button class="no" id="btnNo">Нет 😔</button>
        </div>

        <p class="hint"> 💌</p>
      </div>

      <div class="left"></div>
      <div class="right"></div>
      <div class="front"></div>
      <div class="flap" id="flap"></div>
      <div class="seal">💖</div>
    </div>

    <div class="status" id="status"></div>
  </main>

  <footer>© с 17 ноябра 2024 года ми вместе 💞</footer>
  <div class="cover-block">
        <h2>Спасибо, что ты есть! 💖</h2>
        <p> I will always be with you, we will handle everything together, click on the envelope to see the promise! 💌</p>
        
  </div>

  <script src="script.js"></script>


</body>
</html>
